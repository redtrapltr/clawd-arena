<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#04000a"/>
    </radialGradient>
    <linearGradient id="swordGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7c948"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff3500"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#d0e8ff"/>
      <stop offset="100%" stop-color="#7090b0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#9945ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
  </defs>

  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.8"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3"/>

  <g clip-path="url(#circle)" opacity="0.06">
    <line x1="0" y1="100" x2="400" y2="100" stroke="#ff6b35" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#ff6b35" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#ff6b35" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#ff6b35" stroke-width="1"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#ff6b35" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#ff6b35" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#ff6b35" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#ff6b35" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="#ff6b35" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#ff6b35" stroke-width="1"/>
  </g>

  <ellipse cx="200" cy="200" rx="60" ry="120" fill="#ff6b35" opacity="0.06" filter="url(#softglow)"/>

  <g transform="rotate(-40, 200, 200)" filter="url(#glow)">
    <rect x="197" y="60" width="6" height="175" rx="3" fill="url(#bladeGrad)"/>
    <rect x="197" y="60" width="2" height="175" rx="1" fill="white" opacity="0.6"/>
    <polygon points="200,44 196,66 204,66" fill="url(#bladeGrad)"/>
    <rect x="182" y="223" width="36" height="8" rx="4" fill="url(#swordGrad)"/>
    <circle cx="182" cy="227" r="5" fill="#f7c948"/>
    <circle cx="218" cy="227" r="5" fill="#f7c948"/>
    <rect x="196" y="231" width="8" height="40" rx="4" fill="#7c3a0a"/>
    <rect x="197" y="233" width="3" height="36" rx="2" fill="#b85a14" opacity="0.6"/>
    <circle cx="200" cy="277" r="9" fill="url(#swordGrad)"/>
    <circle cx="200" cy="277" r="4" fill="#f7c948" opacity="0.8"/>
  </g>

  <g transform="rotate(40, 200, 200)" filter="url(#glow)">
    <rect x="197" y="60" width="6" height="175" rx="3" fill="url(#bladeGrad)"/>
    <rect x="201" y="60" width="2" height="175" rx="1" fill="white" opacity="0.4"/>
    <polygon points="200,44 196,66 204,66" fill="url(#bladeGrad)"/>
    <rect x="182" y="223" width="36" height="8" rx="4" fill="url(#swordGrad)"/>
    <circle cx="182" cy="227" r="5" fill="#ff6b35"/>
    <circle cx="218" cy="227" r="5" fill="#ff6b35"/>
    <rect x="196" y="231" width="8" height="40" rx="4" fill="#7c3a0a"/>
    <rect x="197" y="233" width="3" height="36" rx="2" fill="#b85a14" opacity="0.6"/>
    <circle cx="200" cy="277" r="9" fill="url(#swordGrad)"/>
    <circle cx="200" cy="277" r="4" fill="#ff6b35" opacity="0.8"/>
  </g>

  <circle cx="200" cy="200" r="14" fill="#ff6b35" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="200" cy="200" r="8" fill="#f7c948"/>
  <circle cx="200" cy="200" r="4" fill="white" opacity="0.9"/>

  <circle cx="200" cy="16" r="4" fill="#ff6b35" filter="url(#glow)"/>
  <circle cx="200" cy="384" r="4" fill="#ff6b35" filter="url(#glow)"/>
  <circle cx="16" cy="200" r="4" fill="#f7c948" filter="url(#glow)"/>
  <circle cx="384" cy="200" r="4" fill="#f7c948" filter="url(#glow)"/>
  <circle cx="69" cy="69" r="3" fill="#9945ff" filter="url(#glow)"/>
  <circle cx="331" cy="69" r="3" fill="#9945ff" filter="url(#glow)"/>
  <circle cx="69" cy="331" r="3" fill="#9945ff" filter="url(#glow)"/>
  <circle cx="331" cy="331" r="3" fill="#9945ff" filter="url(#glow)"/>
</svg>
